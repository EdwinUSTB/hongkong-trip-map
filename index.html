<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>香港 7月14日至17日旅行地图</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      --ink: #18212b;
      --muted: #637083;
      --line: #d9e0e8;
      --panel: #ffffff;
      --bg: #f6f7f9;
      --day14: #0f766e;
      --day15: #2563a8;
      --day16: #8a5a10;
      --day17: #8b3a62;
      --hotel: #bd1f3a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(330px, 430px) minmax(0, 1fr);
      min-height: 100vh;
    }

    aside {
      background: var(--panel);
      border-right: 1px solid var(--line);
      overflow-y: auto;
      max-height: 100vh;
    }

    header {
      padding: 20px 22px 14px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .controls {
      display: grid;
      gap: 8px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .control-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    button,
    a.map-link {
      min-height: 38px;
      border: 1px solid #bbc6d4;
      background: #fff;
      color: var(--ink);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
    }

    button:hover,
    a.map-link:hover {
      background: #edf3f7;
    }

    button.active {
      color: #fff;
      border-color: transparent;
      font-weight: 750;
    }

    .map-link[hidden],
    .day-panel[hidden] {
      display: none;
    }

    .legend {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 12px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      color: var(--muted);
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
    }

    .section-title {
      position: sticky;
      top: 0;
      z-index: 1;
      padding: 10px 16px;
      color: #fff;
      font-size: 13px;
      font-weight: 750;
      letter-spacing: 0;
    }

    ol {
      list-style: none;
      margin: 0;
      padding: 0 0 20px;
    }

    li {
      display: grid;
      grid-template-columns: 36px minmax(0, 1fr);
      gap: 10px;
      padding: 11px 16px;
      border-bottom: 1px solid #edf0f4;
      cursor: pointer;
    }

    li:hover { background: #f1f5f8; }

    .num {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      color: #fff;
      display: inline-grid;
      place-items: center;
      font-size: 11px;
      font-weight: 800;
      margin-top: 2px;
    }

    .title {
      display: block;
      font-weight: 700;
      font-size: 14px;
      line-height: 1.35;
      margin-bottom: 4px;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    #map { min-height: 100vh; }

    .marker-dot {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      color: white;
      border: 2px solid #fff;
      box-shadow: 0 2px 9px rgba(0, 0, 0, 0.28);
      display: grid;
      place-items: center;
      font-size: 11px;
      font-weight: 800;
    }

    .leaflet-popup-content {
      min-width: 230px;
      line-height: 1.45;
    }

    .popup-title {
      font-weight: 750;
      margin-bottom: 4px;
    }

    .popup-meta {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .popup-link {
      display: inline-block;
      color: #0b5cad;
      text-decoration: none;
      font-size: 12px;
      margin-top: 4px;
    }

    @media (max-width: 820px) {
      .layout { grid-template-columns: 1fr; }
      aside {
        max-height: none;
        border-right: 0;
      }
      #map { min-height: 64vh; }
    }
  </style>
</head>
<body>
  <main class="layout">
    <aside>
      <header>
        <h1>香港 7月14日至17日旅行地图</h1>
        <p class="sub">按天分开展示：点击日期后，地图、路线、列表和导航入口只显示当天行程。酒店固定为湾仔庆云街19号；西贡徒步段为地理参考线，实际请以现场路况、天气和官方路径为准。</p>
      </header>

      <section class="controls">
        <div class="control-grid">
          <button type="button" data-day="day14">7月14日 山顶</button>
          <button type="button" data-day="day15">7月15日 市区</button>
          <button type="button" data-day="day16">7月16日 西贡徒步</button>
          <button type="button" data-day="day17">7月17日 港大返程</button>
        </div>
        <a class="map-link" data-day-link="day14" href="https://www.google.com/maps/dir/?api=1&origin=22.2770,114.1782&destination=22.2715,114.1499&waypoints=22.2783,114.1592%7C22.2758,114.1568&travelmode=driving" target="_blank" rel="noopener">7/14 Google Maps：酒店到山顶</a>
        <a class="map-link" data-day-link="day15" href="https://www.google.com/maps/dir/?api=1&origin=22.2770,114.1782&destination=22.2722,114.1830&waypoints=22.2819,114.1589%7C22.2825,114.1537%7C22.2813,114.1539%7C22.2834,114.1525%7C22.2844,114.1500%7C22.2873,114.1613%7C22.2930,114.1686%7C22.2937,114.1747%7C22.2815,114.1750&travelmode=walking" target="_blank" rel="noopener">7/15 Google Maps：市区串联</a>
        <a class="map-link" data-day-link="day16" href="https://www.google.com/maps/dir/?api=1&origin=22.2770,114.1782&destination=22.3835,114.2714&waypoints=22.3747,114.2734%7C22.3648,114.3711%7C22.3645,114.3794%7C22.3935,114.3792%7C22.3995,114.3823&travelmode=driving" target="_blank" rel="noopener">7/16 Google Maps：西贡与徒步端点</a>
        <a class="map-link" data-day-link="day17" href="https://www.google.com/maps/dir/?api=1&origin=22.2770,114.1782&destination=22.3080,113.9185&waypoints=22.2830,114.1370%7C22.2770,114.1782%7C22.2849,114.1589&travelmode=driving" target="_blank" rel="noopener">7/17 Google Maps：港大到机场</a>
      </section>

      <section class="legend">
        <span><i class="swatch" style="background: var(--day14)"></i>7月14日</span>
        <span><i class="swatch" style="background: var(--day15)"></i>7月15日</span>
        <span><i class="swatch" style="background: var(--day16)"></i>7月16日</span>
        <span><i class="swatch" style="background: var(--day17)"></i>7月17日</span>
        <span><i class="swatch" style="background: var(--hotel)"></i>酒店/机场</span>
      </section>

      <div id="stop-list"></div>
    </aside>

    <section id="map" aria-label="香港四天旅行地图"></section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const dayMeta = {
      day14: { label: '7月14日 周二：抵港与太平山', color: '#0f766e' },
      day15: { label: '7月15日 周三：中环、尖沙咀、跑马地', color: '#2563a8' },
      day16: { label: '7月16日 周四：西贡与麦理浩径二段', color: '#8a5a10' },
      day17: { label: '7月17日 周五：香港大学与返程', color: '#8b3a62' },
      hotel: { label: '酒店 / 机场', color: '#bd1f3a' }
    };

    const stops = [
      { id: '14-1', day: 'day14', time: '13:00', name: '香港国际机场', note: '抵达、入境、取行李，预计 1-1.5 小时。', lat: 22.3080, lng: 113.9185, tag: 'airport' },
      { id: '14-2', day: 'day14', time: '14:30-15:30', name: '湾仔庆云街19号酒店', note: '机场快线到香港站，再打车到酒店。', lat: 22.2770, lng: 114.1782, tag: 'hotel' },
      { id: '14-3', day: 'day14', time: '16:30-17:00', name: '花园道山顶缆车站', note: '从酒店打车最方便，建议提前购票。', lat: 22.2783, lng: 114.1592 },
      { id: '14-4', day: 'day14', time: '17:00-17:30', name: '山顶缆车上山', note: '到达山顶广场一带。', lat: 22.2715, lng: 114.1499 },
      { id: '14-5', day: 'day14', time: '17:30-19:00', name: '山顶广场 / 凌霄阁', note: '山顶活动核心区，可补给、观景。', lat: 22.2718, lng: 114.1498 },
      { id: '14-6', day: 'day14', time: '17:30-19:00', name: '卢吉道观景段', note: '走前段即可，主要看中环、维港、九龙方向。', lat: 22.2758, lng: 114.1455 },
      { id: '14-7', day: 'day14', time: '19:00-20:00', name: '太平山夜景观赏点', note: '日落和夜景重点时段。', lat: 22.2716, lng: 114.1491 },
      { id: '14-8', day: 'day14', time: '21:00后', name: '中环 / 湾仔晚餐后回酒店', note: '第一天不建议安排太晚。', lat: 22.2770, lng: 114.1782, tag: 'hotel' },

      { id: '15-1', day: 'day15', time: '09:00-09:30', name: '湾仔庆云街19号酒店', note: '前往中环，可乘巴士、港铁或打车。', lat: 22.2770, lng: 114.1782, tag: 'hotel' },
      { id: '15-2', day: 'day15', time: '09:30-12:30', name: '中环街市', note: '中环及上环城市漫步起点。', lat: 22.2819, lng: 114.1589 },
      { id: '15-3', day: 'day15', time: '09:30-12:30', name: '半山扶梯', note: '从中环向半山方向慢走。', lat: 22.2825, lng: 114.1537 },
      { id: '15-4', day: 'day15', time: '09:30-12:30', name: '大馆 Tai Kwun', note: '历史建筑群，适合安排较长停留。', lat: 22.2813, lng: 114.1539 },
      { id: '15-5', day: 'day15', time: '09:30-12:30', name: 'PMQ 元创方', note: '文创、设计店铺集中。', lat: 22.2834, lng: 114.1525 },
      { id: '15-6', day: 'day15', time: '09:30-12:30', name: '文武庙 / 荷李活道', note: '上午步行段西侧终点。', lat: 22.2844, lng: 114.1500 },
      { id: '15-7', day: 'day15', time: '12:30-14:00', name: '中环 / 上环午餐区域', note: '茶餐厅、烧味或港式点心。', lat: 22.2820, lng: 114.1550 },
      { id: '15-8', day: 'day15', time: '15:30-16:00', name: '中环码头 / 天星小轮', note: '从中环码头上船前往尖沙咀。', lat: 22.2873, lng: 114.1613 },
      { id: '15-9', day: 'day15', time: '16:00-18:00', name: '尖沙咀码头 / 钟楼', note: '下船后开始维港海滨步行。', lat: 22.2930, lng: 114.1686 },
      { id: '15-10', day: 'day15', time: '16:00-18:00', name: '香港文化中心', note: '灯光秀前后都适合观景。', lat: 22.2932, lng: 114.1698 },
      { id: '15-11', day: 'day15', time: '16:00-19:30', name: '星光大道', note: '晚餐前海滨散步重点段。', lat: 22.2937, lng: 114.1747 },
      { id: '15-12', day: 'day15', time: '18:00-19:30', name: 'K11 MUSEA 海滨 / 晚餐', note: '建议在灯光秀前吃完。', lat: 22.2932, lng: 114.1745 },
      { id: '15-13', day: 'day15', time: '19:30-20:10', name: '幻彩咏香江观赏点', note: '香港文化中心外或星光大道观看。', lat: 22.2933, lng: 114.1715 },
      { id: '15-14', day: 'day15', time: '20:15-20:35', name: '湾仔码头', note: '从尖沙咀码头乘天星小轮返回湾仔。', lat: 22.2815, lng: 114.1750 },
      { id: '15-15', day: 'day15', time: '20:35-20:50', name: '跑马地马场公众席入口', note: '从湾仔码头打车约 10-15 分钟。', lat: 22.2722, lng: 114.1830 },
      { id: '15-16', day: 'day15', time: '23:00后', name: '返回庆云街酒店', note: '距离较近，可步行或短程打车。', lat: 22.2770, lng: 114.1782, tag: 'hotel' },

      { id: '16-1', day: 'day16', time: '07:00-07:30', name: '湾仔庆云街19号酒店', note: '早起前往西贡，避开中午高温。', lat: 22.2770, lng: 114.1782, tag: 'hotel' },
      { id: '16-2', day: 'day16', time: '08:30左右', name: '西贡市中心', note: '购买早餐、水和徒步补给。', lat: 22.3835, lng: 114.2714 },
      { id: '16-3', day: 'day16', time: '09:00-09:40', name: '万宜水库东坝', note: '建议从西贡市中心与其他游客拼出租车。', lat: 22.3648, lng: 114.3711 },
      { id: '16-4', day: 'day16', time: '09:40-10:20', name: '东坝地质景观', note: '六角形岩柱和水库景观。', lat: 22.3642, lng: 114.3742 },
      { id: '16-5', day: 'day16', time: '10:20-11:00', name: '浪茄湾', note: '进入麦理浩径第二段附近路线。', lat: 22.3645, lng: 114.3794 },
      { id: '16-6', day: 'day16', time: '11:00-12:30', name: '西湾山路段', note: '较晒、爬升明显，注意补水。', lat: 22.3823, lng: 114.3848 },
      { id: '16-7', day: 'day16', time: '12:30-13:15', name: '西湾', note: '休息和午餐，建议自带干粮。', lat: 22.3935, lng: 114.3792 },
      { id: '16-8', day: 'day16', time: '13:15-14:15', name: '咸田湾', note: '麦理浩径经典海岸景观。', lat: 22.3995, lng: 114.3823 },
      { id: '16-9', day: 'day16', time: '14:15-16:00', name: '大浪坳', note: '前往北潭凹前仍有上下坡。', lat: 22.4092, lng: 114.3695 },
      { id: '16-10', day: 'day16', time: '16:00后', name: '北潭凹', note: '乘 94 路巴士或打车返回西贡，留意班次。', lat: 22.4079, lng: 114.3248 },
      { id: '16-11', day: 'day16', time: '17:00-18:30', name: '西贡晚餐', note: '徒步后补充水分和能量。', lat: 22.3835, lng: 114.2714 },
      { id: '16-12', day: 'day16', time: '18:30-20:00', name: '返回庆云街酒店', note: '当晚不再安排其他景点。', lat: 22.2770, lng: 114.1782, tag: 'hotel' },

      { id: '17-1', day: 'day17', time: '07:30-08:00', name: '湾仔庆云街19号酒店', note: '退房并寄存行李，提前与酒店确认。', lat: 22.2770, lng: 114.1782, tag: 'hotel' },
      { id: '17-2', day: 'day17', time: '08:00-08:40', name: '香港大学站', note: '打车最快，也可乘港铁到香港大学站。', lat: 22.2830, lng: 114.1370 },
      { id: '17-3', day: 'day17', time: '08:40-10:30', name: '香港大学百周年校园', note: '百周年校园、大学街、中山广场。', lat: 22.2839, lng: 114.1367 },
      { id: '17-4', day: 'day17', time: '08:40-10:30', name: '香港大学主楼外观', note: '工作日上午参观建议提前预约。', lat: 22.2842, lng: 114.1383 },
      { id: '17-5', day: 'day17', time: '10:30-11:10', name: '返回酒店取行李', note: '建议打车，减少转车时间。', lat: 22.2770, lng: 114.1782, tag: 'hotel' },
      { id: '17-6', day: 'day17', time: '11:15-11:45', name: '香港站', note: '预留堵车和取票时间。', lat: 22.2849, lng: 114.1589 },
      { id: '17-7', day: 'day17', time: '12:30-13:00', name: '香港国际机场 T2', note: '距 16:00 起飞约 3 小时，按 T2 指引办理手续。', lat: 22.3080, lng: 113.9185, tag: 'airport' },
      { id: '17-8', day: 'day17', time: '16:00', name: '航班起飞离开香港', note: '提前确认航空公司值机柜台和登机口。', lat: 22.3080, lng: 113.9185, tag: 'airport' }
    ];

    function colorFor(stop) {
      if (stop.tag === 'hotel' || stop.tag === 'airport') return dayMeta.hotel.color;
      return dayMeta[stop.day].color;
    }

    function labelFor(stop, indexInDay) {
      return stop.id.split('-')[0].slice(0, 2) + '-' + String(indexInDay + 1);
    }

    const map = L.map('map', { scrollWheelZoom: true });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const dayCounts = {};
    const markers = [];
    const routeLines = {};
    const boundsByGroup = {};

    function googleSearch(stop) {
      return `https://www.google.com/maps/search/?api=1&query=${stop.lat},${stop.lng}`;
    }

    function makeIcon(stop, text) {
      return L.divIcon({
        className: '',
        html: `<div class="marker-dot" style="background:${colorFor(stop)}">${text}</div>`,
        iconSize: [30, 30],
        iconAnchor: [15, 15],
        popupAnchor: [0, -15]
      });
    }

    stops.forEach((stop) => {
      dayCounts[stop.day] = dayCounts[stop.day] || 0;
      const markerText = labelFor(stop, dayCounts[stop.day]);
      dayCounts[stop.day] += 1;
      const marker = L.marker([stop.lat, stop.lng], { icon: makeIcon(stop, markerText) });
      marker.bindPopup(`
        <div class="popup-title">${markerText} ${stop.name}</div>
        <div class="popup-meta">${dayMeta[stop.day].label}<br>${stop.time}</div>
        <div>${stop.note}</div>
        <a class="popup-link" href="${googleSearch(stop)}" target="_blank" rel="noopener">在 Google Maps 打开此点</a>
      `);
      markers.push({ marker, stop, markerText });
      boundsByGroup[stop.day] = boundsByGroup[stop.day] || [];
      boundsByGroup[stop.day].push([stop.lat, stop.lng]);
    });

    Object.keys(dayMeta).forEach((day) => {
      if (!day.startsWith('day')) return;
      const points = stops.filter((stop) => stop.day === day).map((stop) => [stop.lat, stop.lng]);
      routeLines[day] = L.polyline(points, {
        color: dayMeta[day].color,
        weight: 4,
        opacity: 0.82,
        dashArray: day === 'day16' ? '8 8' : undefined
      });
    });

    const listRoot = document.getElementById('stop-list');
    Object.keys(dayMeta).filter((day) => day.startsWith('day')).forEach((day) => {
      const panel = document.createElement('div');
      panel.className = 'day-panel';
      panel.dataset.dayPanel = day;

      const title = document.createElement('div');
      title.className = 'section-title';
      title.style.background = dayMeta[day].color;
      title.textContent = dayMeta[day].label;
      panel.appendChild(title);

      const list = document.createElement('ol');
      const dayStops = stops.filter((stop) => stop.day === day);
      dayStops.forEach((stop, idx) => {
        const item = document.createElement('li');
        const markerText = labelFor(stop, idx);
        item.innerHTML = `
          <span class="num" style="background:${colorFor(stop)}">${markerText}</span>
          <span>
            <span class="title">${stop.name}</span>
            <span class="meta">${stop.time}<br>${stop.note}</span>
          </span>
        `;
        item.addEventListener('click', () => {
          const found = markers.find((entry) => entry.stop.id === stop.id);
          map.setView([stop.lat, stop.lng], 16);
          found.marker.openPopup();
        });
        list.appendChild(item);
      });
      panel.appendChild(list);
      listRoot.appendChild(panel);
    });

    function showDay(day) {
      markers.forEach(({ marker, stop }) => {
        if (stop.day === day) {
          if (!map.hasLayer(marker)) marker.addTo(map);
        } else if (map.hasLayer(marker)) {
          map.removeLayer(marker);
        }
      });

      Object.entries(routeLines).forEach(([routeDay, line]) => {
        if (routeDay === day) {
          if (!map.hasLayer(line)) line.addTo(map);
        } else if (map.hasLayer(line)) {
          map.removeLayer(line);
        }
      });

      document.querySelectorAll('[data-day]').forEach((button) => {
        const active = button.dataset.day === day;
        button.classList.toggle('active', active);
        button.style.background = active ? dayMeta[day].color : '#fff';
      });

      document.querySelectorAll('[data-day-link]').forEach((link) => {
        link.hidden = link.dataset.dayLink !== day;
      });

      document.querySelectorAll('[data-day-panel]').forEach((panel) => {
        panel.hidden = panel.dataset.dayPanel !== day;
      });

      fitDay(day);
    }

    function fitDay(day) {
      const points = boundsByGroup[day];
      const bounds = L.latLngBounds(points);
      map.fitBounds(bounds, { padding: [44, 44], maxZoom: 15 });
    }

    document.querySelectorAll('[data-day]').forEach((button) => {
      button.addEventListener('click', () => showDay(button.dataset.day));
    });

    showDay('day14');
  </script>
</body>
</html>
